name: Trigger auto deployment for vendor-search

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/vendor-search-AutoDeployTrigger-92031ba4-5547-4902-b8f6-5f38bae6f5f9.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: vendorsearchbuild.azurecr.io
          registryUsername: ${{ secrets.VENDORSEARCH_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.VENDORSEARCH_REGISTRY_PASSWORD }}
          containerAppName: vendor-search
          resourceGroup: RG_AI_Emmi
          imageToBuild: vendorsearchbuild.azurecr.io/vendor-search:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_



